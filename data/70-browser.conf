BROWSER="/usr/bin/taskset -c 4-7 /usr/bin/invoker --type=browser,silica-qt5 -A -- /usr/bin/atlantic-browser"

# ── JSC JIT thread tuning (Snapdragon 665: 8-core big.LITTLE) ────────────────
# On Linux ARM64 the Darwin thread-cap block in Options.cpp does not apply, so
# JSC defaults to 7 FTL compiler threads and 8 GC marker threads on an 8-core
# device.  That floods the CPU during initial page load.  These env vars mirror
# the Darwin ARM64 conservative limits until a matching source patch is built in.
#
# Breakdown of what each pool does while a page loads:
#   Baseline  — quick first-pass JIT, low latency
#   DFG       — typed-IR mid-tier, runs concurrently
#   FTL (B3)  — heavy optimising tier; worst offender at 7 threads by default
#   GC marks  — parallel heap scan; 8 threads competes with rendering

JSC_numberOfFTLCompilerThreads=2
JSC_numberOfDFGCompilerThreads=2
JSC_numberOfBaselineCompilerThreads=2
JSC_numberOfGCMarkers=4
JSC_maxNumberOfWorklistThreads=4
JSC_worklistLoadFactor=20
JSC_worklistFTLLoadWeight=20
JSC_worklistDFGLoadWeight=5
JSC_worklistBaselineLoadWeight=2

# ── JSC JIT tier-up thresholds ───────────────────────────────────────────────
# Default Baseline threshold is 500 calls and DFG is 1000 calls.  On a slow
# mobile device functions spend too long in the LLInt interpreter before the
# JIT kicks in.  Halving both thresholds moves hot Svelte / React reactive
# helpers into compiled code sooner.  DFG/FTL compilation runs on background
# threads (useConcurrentJIT=true) so this does not block the main thread.
# FTL threshold is left at default (64 000) — long-lived hot loops still
# benefit; but page-load code won't reach it anyway.
JSC_thresholdForJITAfterWarmUp=100
JSC_thresholdForOptimizeAfterWarmUp=500

# ── JSC GC heap tuning ────────────────────────────────────────────────────────
# Allow the JS heap to grow freely up to 80 % of available RAM before
# triggering conservative GC.  Without this Linux gets a much smaller fraction,
# causing excessive GC churn on SPA / JS-heavy pages.
#
# largeHeapSize (default 32 MB) is the floor that activates the "large heap"
# code path.  Raising it to 64 MB gives SPAs a bigger initial eden budget
# before the GC scheduling switches regime, reducing early GC pauses during
# page initialisation (e.g. when a 773 KB SSR blob expands to 30-50 MB of
# live objects).
JSC_smallHeapRAMFraction=0.8
JSC_largeHeapRAMFraction=0.9
JSC_largeHeapSize=67108864

# ── Skia painting thread caps (Snapdragon 665 / Adreno 610) ──────────────────
# With ENABLE_GPU_PROCESS=ON + USE_SKIA=ON, the GPU process uses Skia/Ganesh
# for tile rasterisation.  Default GPU painting thread count is 2 (for ≥4 cores)
# and CPU painting threads default to max(1, min(8, cores/2)) = 4.
#
# On Adreno 610 the GPU command queue is single-threaded at the driver level,
# so two competing Skia GPU threads gain nothing and only add context-switch
# and memory overhead.  Cap at 1.  CPU threads are capped at 2 as a safety
# ceiling for the software-rasterisation fallback path (no-op on the GPU path
# but prevents thread explosion if the GPU context becomes unavailable).
WEBKIT_SKIA_GPU_PAINTING_THREADS=1
WEBKIT_SKIA_CPU_PAINTING_THREADS=2

# ── Tile size ─────────────────────────────────────────────────────────────────
# CoordinatedBackingStoreProxy defaults to 256 px tiles.  WCTileGrid (the
# compositor-side counterpart) is hardcoded to 512 px.  Aligning both to 512 px
# eliminates tile-boundary mismatches and halves the number of GPU texture
# uploads per frame on a 1080p viewport while keeping total tile memory the
# same (fewer, larger tiles cover the same area).  512×512 RGBA = 1 MiB/tile
# fits comfortably inside Adreno 610's 512-px-aligned texture cache lines.
WEBKIT_LAYERS_TILE_SIZE=512
