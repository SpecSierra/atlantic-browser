BROWSER="/usr/bin/taskset -c 4-7 /usr/bin/invoker --type=browser,silica-qt5 -A -- /usr/bin/atlantic-browser"

# ── JSC JIT thread tuning (Snapdragon 665: 8-core big.LITTLE) ────────────────
# On Linux ARM64 the Darwin thread-cap block in Options.cpp does not apply, so
# JSC defaults to 7 FTL compiler threads and 8 GC marker threads on an 8-core
# device.  That floods the CPU during initial page load.  These env vars mirror
# the Darwin ARM64 conservative limits until a matching source patch is built in.
#
# Breakdown of what each pool does while a page loads:
#   Baseline  — quick first-pass JIT, low latency
#   DFG       — typed-IR mid-tier, runs concurrently
#   FTL (B3)  — heavy optimising tier; worst offender at 7 threads by default
#   GC marks  — parallel heap scan; 8 threads competes with rendering

JSC_numberOfFTLCompilerThreads=2
JSC_numberOfDFGCompilerThreads=2
JSC_numberOfBaselineCompilerThreads=2
JSC_numberOfGCMarkers=4
JSC_maxNumberOfWorklistThreads=4
JSC_worklistLoadFactor=20
JSC_worklistFTLLoadWeight=20
JSC_worklistDFGLoadWeight=5
JSC_worklistBaselineLoadWeight=2

# ── JSC GC heap tuning ────────────────────────────────────────────────────────
# Allow the JS heap to grow freely up to 80 % of available RAM before
# triggering conservative GC.  Without this Linux gets a much smaller fraction,
# causing excessive GC churn on SPA / JS-heavy pages.
JSC_smallHeapRAMFraction=0.8
JSC_largeHeapRAMFraction=0.9
