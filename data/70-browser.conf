BROWSER="/usr/bin/taskset -c 4-7 /usr/bin/invoker --type=browser,silica-qt5 -A -- /usr/bin/atlantic-browser"

# NOTE: do NOT add JSC_* / WEBKIT_* engine tuning here. This file is imported
# into the systemd user session environment, which outlives RPM upgrades and
# silently overrides the values set by the Atlantic launchers — that is how
# stale tile-size and JSC heap settings kept "coming back" (see atlantic-engine
# commit 1b5f9ca). All engine runtime tuning lives in
# atlantic-engine/deploy/runtime-common.sh, which is re-exported on every
# launch; retired variables are explicitly unset there to neutralise old
# copies of this file still present on devices.
